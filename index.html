<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorinde — Job Pipeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: linear-gradient(135deg, #0F0C29 0%, #1a1a2e 50%, #16213e 100%); min-height: 100vh; color: #E8E8E8; }
  button { cursor: pointer; font-family: Georgia, serif; }
  input, select, textarea { font-family: Georgia, serif; outline: none; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

  .header { background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; font-weight: 700; background: linear-gradient(90deg, #C9A84C, #F0D080); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-meta { font-size: 11px; color: #555; font-family: monospace; margin-top: 3px; }
  .save-ok { color: #4ade80; margin-left: 10px; }
  .save-err { color: #f87171; margin-left: 10px; }

  /* TAB NAV */
  .tab-nav { display: flex; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0 28px; gap: 0; }
  .tab-btn { padding: 12px 20px; border: none; background: transparent; color: #555; font-family: monospace; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab-btn.active { color: #C9A84C; border-bottom-color: #C9A84C; }
  .tab-btn:hover:not(.active) { color: #999; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .view-toggle { display: flex; background: rgba(255,255,255,0.06); border-radius: 8px; padding: 3px; border: 1px solid rgba(255,255,255,0.1); }
  .view-btn { padding: 5px 12px; border-radius: 6px; border: none; font-size: 12px; font-family: monospace; background: transparent; color: #666; transition: all 0.2s; }
  .view-btn.active { background: rgba(201,168,76,0.3); color: #C9A84C; }
  .add-btn { padding: 8px 16px; background: linear-gradient(135deg, #C9A84C, #F0D080); border: none; border-radius: 8px; font-size: 13px; font-weight: 600; color: #0F0C29; }

  .urgent-bar { background: rgba(220,38,38,0.12); border-bottom: 1px solid rgba(220,38,38,0.25); padding: 8px 28px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .urgent-label { font-size: 11px; color: #FCA5A5; font-family: monospace; font-weight: 700; }
  .urgent-tag { font-size: 11px; color: #FCA5A5; font-family: monospace; background: rgba(220,38,38,0.2); padding: 2px 10px; border-radius: 20px; cursor: pointer; }

  .main { padding: 20px 28px; }
  .filters { display: flex; gap: 6px; margin-bottom: 18px; align-items: center; flex-wrap: wrap; }
  .filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); font-size: 11px; font-family: monospace; background: transparent; color: #666; cursor: pointer; }
  .filter-btn.active { background: rgba(201,168,76,0.2); color: #C9A84C; border-color: rgba(201,168,76,0.4); }
  .filter-count { margin-left: auto; font-size: 11px; color: #444; font-family: monospace; }

  .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media(max-width: 800px) { .kanban { grid-template-columns: 1fr; } }
  .column { background: rgba(255,255,255,0.025); border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); padding: 14px; min-height: 80px; }
  .col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .status-badge { font-size: 10px; font-family: monospace; font-weight: 700; padding: 2px 10px; border-radius: 20px; }
  .col-count { font-size: 11px; color: #444; font-family: monospace; }

  .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s; }
  .card:hover { background: rgba(255,255,255,0.08); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .card-company { font-size: 13px; font-weight: 700; color: #E8E8E8; }
  .card-role { font-size: 11px; color: #777; margin-top: 2px; }
  .priority-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-family: monospace; font-weight: 600; white-space: nowrap; }
  .next-action-strip { font-size: 10px; color: #C9A84C; background: rgba(201,168,76,0.08); padding: 5px 8px; border-radius: 5px; border-left: 2px solid #C9A84C; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .card-deadline { font-size: 10px; color: #555; font-family: monospace; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 9px 12px; text-align: left; color: #555; font-family: monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.08); white-space: nowrap; }
  td { padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  tr.data-row { cursor: pointer; transition: background 0.1s; }
  tr.data-row:hover td { background: rgba(255,255,255,0.03); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px; max-width: 560px; width: 100%; max-height: 88vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; color: #E8E8E8; margin-bottom: 16px; }
  .modal-close { background: none; border: none; color: #555; font-size: 18px; float: right; cursor: pointer; }

  .detail-company { font-size: 20px; color: #E8E8E8; font-weight: 700; }
  .detail-role { font-size: 13px; color: #777; margin-top: 3px; margin-bottom: 14px; }
  .detail-link { font-size: 11px; color: #C9A84C; font-family: monospace; display: block; margin-bottom: 14px; }

  .section-label { font-size: 9px; color: #444; font-family: monospace; text-transform: uppercase; margin-bottom: 6px; }
  .status-btns { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 16px; }
  .status-btn { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-family: monospace; cursor: pointer; transition: all 0.15s; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .info-cell { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 9px 12px; }
  .info-label { font-size: 9px; color: #444; font-family: monospace; text-transform: uppercase; margin-bottom: 3px; }
  .info-value { font-size: 13px; color: #E8E8E8; }

  .detail-block { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 11px 13px; margin-bottom: 10px; font-size: 12px; color: #aaa; line-height: 1.6; }
  .detail-block-label { font-size: 9px; color: #444; font-family: monospace; text-transform: uppercase; margin-bottom: 4px; }
  .detail-next-action { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; padding: 11px 13px; margin-bottom: 10px; }

  .btn-row { display: flex; gap: 10px; margin-top: 4px; }
  .btn-edit { flex: 1; padding: 9px; background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); border-radius: 8px; color: #C9A84C; font-size: 13px; }
  .btn-delete { flex: 1; padding: 9px; background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.2); border-radius: 8px; color: #EF4444; font-size: 13px; }

  .form-section { margin-bottom: 14px; }
  .form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .form-label { font-size: 10px; font-family: monospace; display: block; margin-bottom: 4px; color: #555; text-transform: uppercase; }
  .form-input { width: 100%; padding: 8px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #E8E8E8; font-size: 13px; }
  .form-select { width: 100%; padding: 8px 12px; background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #E8E8E8; font-size: 13px; }
  .btn-save { flex: 1; padding: 10px; background: linear-gradient(135deg, #C9A84C, #F0D080); border: none; border-radius: 8px; font-size: 14px; font-weight: 600; color: #0F0C29; }
  .btn-cancel { flex: 1; padding: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 14px; color: #777; }
  .hidden { display: none; }
  .loading { text-align: center; padding: 60px; color: #555; font-family: monospace; font-size: 13px; }
  .stars { font-family: monospace; }

  /* ── FEED TAB ── */
  .feed-header { padding: 20px 28px 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .feed-title { font-size: 14px; color: #E8E8E8; font-family: monospace; }
  .feed-meta { font-size: 11px; color: #444; font-family: monospace; }
  .feed-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .refresh-btn { padding: 8px 18px; background: rgba(90,180,120,0.15); border: 1px solid rgba(90,180,120,0.3); border-radius: 8px; font-size: 12px; font-family: monospace; color: #5AB478; transition: all 0.2s; }
  .refresh-btn:hover { background: rgba(90,180,120,0.25); }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .feed-filters { padding: 12px 28px 0; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .feed-filter-btn { padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-family: monospace; background: transparent; color: #555; cursor: pointer; }
  .feed-filter-btn.active { background: rgba(90,180,120,0.15); color: #5AB478; border-color: rgba(90,180,120,0.3); }

  .feed-grid { padding: 16px 28px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }

  .feed-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px; transition: background 0.15s; }
  .feed-card:hover { background: rgba(255,255,255,0.06); }

  .feed-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .feed-card-company { font-size: 14px; font-weight: 700; color: #E8E8E8; }
  .feed-card-role { font-size: 11px; color: #777; margin-top: 2px; line-height: 1.4; }
  .feed-overall-score { font-family: monospace; font-size: 20px; font-weight: 700; color: #F0D080; white-space: nowrap; line-height: 1; }
  .feed-overall-label { font-size: 8px; color: #444; font-family: monospace; text-align: right; margin-top: 2px; }

  .feed-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .feed-tag { font-family: monospace; font-size: 9px; padding: 2px 7px; border-radius: 4px; }
  .tag-org { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }
  .tag-engagement { background: rgba(255,255,255,0.06); color: #666; border: 1px solid rgba(255,255,255,0.08); }
  .tag-source { background: rgba(201,168,76,0.1); color: #C9A84C; border: 1px solid rgba(201,168,76,0.2); }
  .tag-hardno { background: rgba(220,38,38,0.15); color: #f87171; border: 1px solid rgba(220,38,38,0.2); }

  .feed-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .score-row { display: flex; justify-content: space-between; align-items: center; }
  .score-label { font-family: monospace; font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
  .score-bar-wrap { flex: 1; margin: 0 8px; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; }
  .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .score-val { font-family: monospace; font-size: 10px; color: #E8E8E8; min-width: 16px; text-align: right; }

  .feed-flags { display: flex; gap: 6px; flex-wrap: wrap; }
  .flag-item { font-family: monospace; font-size: 9px; padding: 2px 7px; border-radius: 4px; }
  .flag-yes { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
  .flag-no { background: rgba(220,38,38,0.1); color: #f87171; border: 1px solid rgba(220,38,38,0.2); }
  .flag-unclear { background: rgba(255,255,255,0.05); color: #666; border: 1px solid rgba(255,255,255,0.08); }

  .feed-summary { font-size: 11px; color: #888; line-height: 1.6; font-style: italic; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

  .feed-actions { display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
  .feed-btn-promote { flex: 2; padding: 7px; background: rgba(90,180,120,0.15); border: 1px solid rgba(90,180,120,0.3); border-radius: 7px; font-size: 11px; font-family: monospace; color: #5AB478; }
  .feed-btn-promote:hover { background: rgba(90,180,120,0.25); }
  .feed-btn-skip { flex: 1; padding: 7px; background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 7px; font-size: 11px; font-family: monospace; color: #444; }
  .feed-btn-skip:hover { color: #666; border-color: rgba(255,255,255,0.15); }
  .feed-btn-link { flex: 1; padding: 7px; background: transparent; border: 1px solid rgba(201,168,76,0.2); border-radius: 7px; font-size: 11px; font-family: monospace; color: #C9A84C; text-decoration: none; text-align: center; }
  .feed-btn-link:hover { background: rgba(201,168,76,0.08); }

  .progress-bar { background: rgba(90,180,120,0.08); border: 1px solid rgba(90,180,120,0.15); border-radius: 8px; padding: 12px 16px; margin: 16px 28px 0; font-family: monospace; font-size: 11px; color: #5AB478; display: none; }
  .progress-bar.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Lorinde — Job Pipeline</h1>
    <div class="header-meta" id="meta">Loading...</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <div class="view-toggle">
      <button class="view-btn active" id="btn-kanban" onclick="setView('kanban')">⊞ Board</button>
      <button class="view-btn" id="btn-table" onclick="setView('table')">≡ List</button>
    </div>
    <button class="add-btn" onclick="openForm(null)">+ Add Role</button>
  </div>
</div>

<!-- TAB NAV -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('pipeline')">⬡ Pipeline</button>
  <button class="tab-btn" onclick="switchTab('feed')">⚡ Job Feed <span id="feed-badge" style="display:none;background:rgba(90,180,120,0.2);color:#5AB478;border-radius:10px;padding:1px 6px;font-size:9px;margin-left:4px;"></span></button>
</div>

<!-- PIPELINE TAB -->
<div class="tab-content active" id="tab-pipeline">
  <div id="urgent-bar" class="urgent-bar hidden"></div>
  <div class="main">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
      <button class="filter-btn" onclick="setFilter('High',this)">High</button>
      <button class="filter-btn" onclick="setFilter('Medium',this)">Medium</button>
      <button class="filter-btn" onclick="setFilter('Low',this)">Low</button>
      <span class="filter-count" id="filter-count"></span>
    </div>
    <div id="kanban-view" class="kanban"><div class="loading">Connecting to database...</div></div>
    <div id="table-view" class="hidden" style="overflow-x:auto;"></div>
  </div>
</div>

<!-- FEED TAB -->
<div class="tab-content" id="tab-feed">
  <div class="feed-header">
    <div>
      <div class="feed-title">Job Feed</div>
      <div class="feed-meta" id="feed-meta">Fetches jobs from Remotive, Wellfound, Idealist + Claude web search across 10+ mission boards</div>
    </div>
    <div class="feed-controls">
      <button class="refresh-btn" id="refresh-btn" onclick="refreshFeed()">⟳ Refresh Feed</button>
      <button class="refresh-btn" style="color:#f87171;border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.08)" onclick="clearFeed()">✕ Clear Feed</button>
    </div>
  </div>

  <div class="progress-bar" id="progress-bar">Initializing...</div>

  <div class="feed-filters">
    <button class="feed-filter-btn active" onclick="setFeedFilter('pending',this)">Pending</button>
    <button class="feed-filter-btn" onclick="setFeedFilter('promoted',this)">Promoted</button>
    <button class="feed-filter-btn" onclick="setFeedFilter('skipped',this)">Skipped</button>
    <button class="feed-filter-btn" onclick="setFeedFilter('all',this)">All</button>
    <span style="margin-left:auto;font-size:10px;color:#444;font-family:monospace;" id="feed-count"></span>
  </div>

  <div class="feed-grid" id="feed-grid">
    <div class="loading">Click "Refresh Feed" to fetch and score new jobs.</div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay hidden" id="detail-overlay">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeDetailModal()">✕</button>
    <div class="detail-company" id="d-company"></div>
    <div class="detail-role" id="d-role"></div>
    <a class="detail-link hidden" id="d-link" target="_blank"></a>
    <div class="section-label">Status</div>
    <div class="status-btns" id="d-status-btns"></div>
    <div class="info-grid" id="d-info-grid"></div>
    <div id="d-next-action-block" class="hidden detail-next-action">
      <div class="detail-block-label" style="color:#C9A84C;">Next Action</div>
      <div id="d-next-action" style="font-size:13px;color:#E8E8E8;"></div>
    </div>
    <div id="d-notes-block" class="hidden detail-block">
      <div class="detail-block-label">Notes</div>
      <div id="d-notes"></div>
    </div>
    <div class="btn-row">
      <button class="btn-edit" id="d-edit-btn">Edit</button>
      <button class="btn-delete" id="d-delete-btn">Delete</button>
    </div>
  </div>
</div>

<!-- Form Modal -->
<div class="overlay hidden" id="form-overlay">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeFormModal()">✕</button>
    <h2 id="form-title">Add New Role</h2>
    <div class="form-section form-grid2">
      <div><label class="form-label">Company</label><input class="form-input" id="f-company"></div>
      <div><label class="form-label">Role / Title</label><input class="form-input" id="f-role"></div>
    </div>
    <div class="form-section form-grid3">
      <div>
        <label class="form-label">Status</label>
        <select class="form-select" id="f-status">
          <option value="researching">Researching</option>
          <option value="applied">Applied</option>
          <option value="interviewing">Interviewing</option>
          <option value="offer">Offer</option>
          <option value="rejected">Rejected</option>
          <option value="on hold">On Hold</option>
        </select>
      </div>
      <div>
        <label class="form-label">Priority</label>
        <select class="form-select" id="f-priority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div><label class="form-label">Salary</label><input class="form-input" id="f-salary"></div>
    </div>
    <div class="form-section form-grid2">
      <div><label class="form-label">Deadline</label><input class="form-input" type="date" id="f-deadline"></div>
      <div><label class="form-label">Source / Contact</label><input class="form-input" id="f-source"></div>
    </div>
    <div class="form-section form-grid3">
      <div><label class="form-label" style="color:#F0D080;">Fit ⚡ (1-5)</label><input class="form-input" type="number" min="1" max="5" id="f-fit" style="color:#F0D080;"></div>
      <div><label class="form-label" style="color:#A78BFA;">Interest ♥ (1-5)</label><input class="form-input" type="number" min="1" max="5" id="f-interest" style="color:#A78BFA;"></div>
      <div></div>
    </div>
    <div class="form-section"><label class="form-label">Link to JD</label><input class="form-input" id="f-link" placeholder="https://..."></div>
    <div class="form-section"><label class="form-label" style="color:#C9A84C;">Next Action</label><input class="form-input" id="f-next-action"></div>
    <div class="form-section"><label class="form-label">Notes</label><textarea class="form-input" id="f-notes" rows="3" style="resize:vertical;"></textarea></div>
    <div class="btn-row" style="margin-top:18px;">
      <button class="btn-save" onclick="saveForm()">Save</button>
      <button class="btn-cancel" onclick="closeFormModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://zxttsqbrooiuoouexlrk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dHRzcWJyb29pdW9vdWV4bHJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTQ2ODQsImV4cCI6MjA4OTE3MDY4NH0.HZo-l_iBeh7rF7wAJtDfGNlRlyj3apy_VOA954Av2WA";
const HEADERS = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY };

// ── SUPABASE ──
async function dbGet() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/jobs?select=*&order=created_at.asc`, { headers: HEADERS });

// ── JOB ANALYSIS (no API needed) ──
function analyzeJob(job) {
  const text = ((job.title || "") + " " + (job.description || "") + " " + (job.location || "")).toLowerCase();
  const title = (job.title || "").toLowerCase();
  const desc = (job.description || "").toLowerCase();
  const loc = (job.location || "").toLowerCase();

  // Mission detection
  const missionMap = [
    { label: "Climate", terms: ["climate","clean energy","renewable","sustainability","net zero","carbon","emissions","green","environment","nature","cleantech","energy transition"] },
    { label: "Global Dev", terms: ["global development","international development","developing countries","lmic","emerging markets","humanitarian","poverty","aid","oda","undp","world bank","unicef","oxfam","relief"] },
    { label: "Health", terms: ["health","medical","healthcare","public health","pandemic","disease","wellbeing","mental health","biotech","pharma","global health","chai","malaria","hiv"] },
    { label: "AI Safety", terms: ["ai safety","alignment","responsible ai","ai governance","existential risk","longtermism","frontier ai","agi","anthropic","deepmind","openai"] },
    { label: "Impact Investing", terms: ["impact invest","esg","blended finance","social finance","microfinance","financial inclusion","impact capital","venture philanthropy","catalytic"] },
    { label: "Education", terms: ["education","edtech","learning","university","school","skills","training","literacy","higher education"] },
    { label: "Policy", terms: ["policy","government","public sector","regulation","advocacy","democracy","governance","think tank","diplomacy"] },
    { label: "Housing", terms: ["housing","shelter","homelessness","urban","community development","techo","habitat"] },
    { label: "Food/Ag", terms: ["food","agriculture","food security","nutrition","alternative protein","food systems"] },
    { label: "Tech for Good", terms: ["tech for good","civic tech","social tech","nonprofit tech","digital public","responsible tech"] },
    { label: "Innovation", terms: ["innovation","startup","venture","accelerator","incubator","social enterprise"] },
    { label: "Financial Inclusion", terms: ["financial inclusion","microfinance","fintech","payments","banking","remittance","unbanked"] },
  ];
  let mission = "General";
  for (const m of missionMap) {
    if (m.terms.some(t => text.includes(t))) { mission = m.label; break; }
  }

  // Seniority - try multiple patterns
  let seniority = null;
  // Pattern: "5+ years" or "5-7 years" or "minimum 5 years"
  const yrPatterns = [
    /(\d+)\s*\+\s*years?\s*(?:of\s*)?(?:experience|exp)/i,
    /(\d+)\s*to\s*\d+\s*years?\s*(?:of\s*)?(?:experience|exp)/i,
    /minimum\s*(?:of\s*)?(\d+)\s*years?\s*(?:of\s*)?(?:experience|exp)/i,
    /at\s*least\s*(\d+)\s*years?\s*(?:of\s*)?(?:experience|exp)/i,
    /(\d+)\s*years?\s*(?:of\s*)?(?:relevant\s*)?(?:professional\s*)?(?:experience|exp)/i,
  ];
  for (const p of yrPatterns) {
    const m = desc.match(p);
    if (m) { seniority = m[1] + "+ yrs exp"; break; }
  }
  // Fallback to title keywords
  if (!seniority) {
    if (/vp|vice president|chief |c-suite/.test(title)) seniority = "Executive";
    else if (/senior|lead|director|head of|principal|manager/.test(title)) seniority = "Senior (5-10 yrs)";
    else if (/junior|entry.?level|associate|coordinator|assistant/.test(title)) seniority = "Junior (0-3 yrs)";
    else if (/mid.?level|analyst|specialist|officer/.test(title)) seniority = "Mid (3-5 yrs)";
  }

  // Remote detection - stricter
  let remote = "No"; // default to No, only Yes if explicit
  if (/remote/.test(loc) || /remote/.test(title)) {
    remote = "Yes";
  } else if (/remote/.test(desc) && !/not remote|no remote|on.?site|in.?office|hybrid|in.?person/.test(desc.slice(0,500))) {
    remote = "Yes";
  } else if (/hybrid/.test(text)) {
    remote = "Hybrid";
  } else if (/on.?site|in.?office|in.?person/.test(text)) {
    remote = "No";
  } else {
    remote = "Unclear";
  }

  // Geography filter - only US, LatAm, Europe, Africa, or global/remote
  const geoText = (loc + " " + desc.slice(0,300)).toLowerCase();
  const allowedGeo = [
    "remote","worldwide","global","anywhere","international",
    // US
    "united states","usa","u.s.","new york","san francisco","washington","chicago","boston","los angeles","seattle","austin","denver",
    // LatAm
    "latin america","latam","argentina","brazil","mexico","colombia","chile","peru","uruguay","costa rica","ecuador","bolivia","paraguay","venezuela","central america","caribbean",
    // Europe
    "europe","european","uk","united kingdom","london","germany","berlin","france","paris","netherlands","amsterdam","spain","madrid","switzerland","geneva","zurich","sweden","stockholm","belgium","brussels","ireland","dublin","italy","rome","milan","portugal","lisbon","denmark","norway","finland","austria","poland",
    // Africa
    "africa","african","kenya","nairobi","nigeria","lagos","south africa","johannesburg","cape town","ghana","accra","ethiopia","rwanda","senegal","tanzania","uganda","mozambique","zimbabwe",
  ];
  const geoOk = allowedGeo.some(g => geoText.includes(g));
  // Block Asia-Pacific only roles
  const asiaOnly = /(singapore|hong kong|australia|sydney|melbourne|new zealand|japan|tokyo|china|beijing|shanghai|india|bangalore|mumbai|southeast asia|apac|asia.pacific)\s*(?:only|based|office|required)/i.test(geoText) && !geoOk;

  // US/CAN work auth - improved
  let usCanAuth = "No";
  const authYesTerms = [
    "must be authorized to work in the us",
    "must be authorized to work in the united states",
    "us work authorization required",
    "authorized to work in the united states",
    "eligible to work in the us",
    "right to work in the us",
    "right to work in the united states",
    "us citizen",
    "green card",
    "no visa sponsorship",
    "unable to sponsor",
    "cannot sponsor",
    "will not sponsor",
    "sponsorship is not available",
    "must be legally authorized",
    "work permit required",
  ];
  if (authYesTerms.some(t => desc.includes(t))) usCanAuth = "Yes";
  else if (/visa sponsorship (is )?available|we (do )?sponsor|sponsorship provided|open to sponsorship/i.test(desc)) usCanAuth = "No";
  else if (/(united states|u\.s\.) only|must be (located|based|residing) in/i.test(desc)) usCanAuth = "Unclear";

  // Comp range - improved patterns
  let comp = null;
  const compPatterns = [
    /\$[\d,]+k?\s*[-–to]+\s*\$?[\d,]+k?/i,
    /\$[\d,]+k?\s*(?:per year|\/year|annually|per annum|usd)/i,
    /(?:salary|compensation|pay)[:\s]+\$[\d,]+/i,
    /[\d,]+\s*[-–]\s*[\d,]+\s*(?:USD|EUR|GBP)/i,
  ];
  for (const p of compPatterns) {
    const m = desc.match(p);
    if (m) { comp = m[0].trim(); break; }
  }

  // Engagement type
  let engagement = "Full-time";
  if (/part.?time/i.test(text)) engagement = "Part-time";
  else if (/fellowship|fellow/i.test(text)) engagement = "Fellowship";
  else if (/internship|intern/i.test(text)) engagement = "Internship";
  else if (/contract|freelance/i.test(text)) engagement = "Contract";
  else if (/short.?term|temporary/i.test(text)) engagement = "Short-term";

  // Org type - use known org names + description signals
  let orgType = "Corporate"; // default
  const knownNGOs = ["oxfam","save the children","techo","care international","mercy corps","world vision","red cross","unicef","undp","who ","oecd","world bank","ifc","idb","giz","usaid","dfid","gates foundation","rockefeller","ford foundation","open society","wellcome trust","skoll","omidyar","hewlett","mckinsey","bcg","bain","deloitte","accenture","mckinsey","pwc"];
  const orgHints = (job.company || "").toLowerCase() + " " + desc.slice(0,400);
  if (knownNGOs.slice(0,14).some(n => orgHints.includes(n))) orgType = "Multilateral/IGO";
  else if (knownNGOs.slice(14,22).some(n => orgHints.includes(n))) orgType = "Foundation";
  else if (/ngo|non.?profit|nonprofit|charity|501.?c3|civil society|social enterprise/i.test(orgHints)) orgType = "NGO/Non-profit";
  else if (/series [a-c]|seed stage|early.?stage|pre.?series|angel round/i.test(orgHints)) orgType = "Startup";
  else if (/series [d-f]|growth.?stage|scale.?up/i.test(orgHints)) orgType = "Scale-up";
  else if (/foundation/i.test(job.company || "")) orgType = "Foundation";
  else if (/university|research institute|think tank|academia/i.test(orgHints)) orgType = "Academia/Research";
  else if (/government|ministry|federal|municipality|public sector/i.test(orgHints)) orgType = "Government";
  else if (/startup|founded in 20[12]\d|we are a small team|early.?stage/i.test(orgHints)) orgType = "Startup";

  // Posting deadline - broader patterns
  let deadline = null;
  const dlPatterns = [
    /(?:deadline|closing date|apply by|applications?\s+(?:due|close[sd]?)|closes?\s+on)[:\s]+([A-Za-z]+ \d{1,2},?\s*\d{4})/i,
    /(?:deadline|closing date|apply by)[:\s]+(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i,
    /open until[:\s]+([A-Za-z]+ \d{1,2},?\s*\d{4})/i,
    /position (?:open|available) until[:\s]+([A-Za-z]+ \d{1,2})/i,
  ];
  for (const p of dlPatterns) {
    const m = desc.match(p);
    if (m) { deadline = m[1].trim(); break; }
  }

  // Hard NO detection
  const hardNoTerms = ["fossil fuel","oil and gas","petroleum","coal mining","defense contractor","weapons manufacturer","military contractor","gambling","casino","tobacco","cigarette manufacturer"];
  const hardNo = hardNoTerms.some(t => text.includes(t));

  return { mission, seniority, remote, usCanAuth, comp, engagement, orgType, deadline, hardNo, geoOk, asiaOnly };
}

// Keyword relevance filter - built from Lorinde's CV + JDs (Wave CoS, UNDP Programme Specialist,
// CHAI Manager, EQL Tech Program Lead, Cultivo Project Manager, Katapult CoS)
function isRelevant(job) {
  const text = ((job.title||"") + " " + (job.description||"")).toLowerCase();
  const title = (job.title||"").toLowerCase();
  const loc = (job.location||"").toLowerCase();

  // Hard NO sectors
  const hardNoTerms = ["fossil fuel","oil and gas","petroleum","coal mining","defense contractor","weapons manufacturer","military contractor","gambling","casino","tobacco"];
  if (hardNoTerms.some(t => text.includes(t))) return false;

  // Geography filter - skip APAC-only roles
  const apacOnly = /(singapore|hong kong|australia|sydney|new zealand|japan|china|india|southeast asia)\s*(?:only|based|office)/i.test(loc);
  if (apacOnly) return false;

  // Must be remote OR in allowed regions
  const allowedRegions = [
    "remote","worldwide","global","anywhere","international",
    // US
    "united states","usa","u.s.","new york","washington","san francisco","chicago","boston",
    // LatAm
    "latin america","latam","argentina","brazil","mexico","colombia","chile","peru","uruguay","costa rica","central america","caribbean",
    // Europe
    "europe","european","uk","united kingdom","london","germany","berlin","france","paris","netherlands","amsterdam","spain","belgium","brussels","sweden","stockholm","switzerland","geneva","ireland","portugal","denmark","norway","finland","austria",
    // Africa
    "africa","african","kenya","nigeria","south africa","ghana","ethiopia","rwanda","senegal","tanzania","uganda"
  ];
  const isAllowedGeo = !loc || loc.trim() === "" || allowedRegions.some(r => loc.includes(r));
  if (!isAllowedGeo) return false;

  // TITLE keywords - must match at least one
  // Drawn from: Wave (Chief of Staff), UNDP (Programme Specialist), CHAI (Manager/Incubator),
  // EQL (Program Lead), Cultivo (Project Manager), Katapult (Chief of Staff),
  // Lorinde's CV roles and skills, career discussions
  const titleKeywords = [
    // Chief of Staff / Ops roles (Wave, Katapult)
    "chief of staff","head of operations","chief operating","vp operations","director of operations",
    // Programme/Project management (UNDP, Cultivo, CHAI)
    "programme specialist","program specialist","programme manager","program manager",
    "programme lead","program lead","project manager","project lead","project director",
    // Strategy roles (BCG background, EQL)
    "strategy manager","strategy lead","strategy director","strategic advisor","strategy officer",
    "head of strategy","director of strategy","strategy and operations","strategy & operations",
    // Innovation / Incubator (CHAI, EQL)
    "innovation manager","innovation lead","innovation director","head of innovation",
    "incubator manager","accelerator manager","ventures lead","new initiatives",
    // Impact / Social impact
    "impact manager","impact lead","impact director","social impact","head of impact",
    "impact investing","impact officer","impact analyst",
    // Policy / Public sector (UNDP, BCG public sector)
    "policy manager","policy advisor","policy director","policy specialist","policy officer",
    "public policy","policy lead","government affairs","regulatory affairs",
    // Partnerships / BD (TECHO, UNDP)
    "partnerships manager","partnerships director","partnerships lead","head of partnerships",
    "business development","bd manager","strategic partnerships","external relations",
    // Advisory / Consulting adjacent
    "senior advisor","senior consultant","senior associate","management consultant",
    "strategy consultant","independent consultant",
    // Development (international dev, UNDP, CHAI)
    "development manager","development director","country director","country manager",
    "regional director","regional manager","area director",
    // NGO/Foundation senior ops
    "operations manager","operations director","chief of party","deputy director",
    "executive director","programme coordinator","programme officer",
    // Philanthropy / Grants (EQL)
    "philanthropy","grants manager","grantmaking","foundation manager",
    // Climate / Sustainability ops (Cultivo, BCG climate)
    "sustainability manager","sustainability director","climate manager","climate lead",
    "esg manager","net zero","transition manager","sustainability officer",
    // FinTech / Financial inclusion (Wave, BCG fintech)
    "fintech","financial inclusion","payments strategy","mobile money",
  ];
  if (!titleKeywords.some(k => title.includes(k))) return false;

  // Exclude clearly wrong role types - expanded
  const excludeTitle = [
    "software engineer","frontend engineer","backend engineer","full stack","full-stack",
    "devops","data engineer","data scientist","machine learning engineer","ml engineer",
    "ai engineer","cloud engineer","site reliability","security engineer",
    "graphic designer","ux designer","ui designer","web designer","visual designer",
    "accountant","bookkeeper","financial controller","tax specialist",
    "sales representative","sales executive","account executive","account manager",
    "recruiter","talent acquisition","hr manager","people ops",
    "content writer","copywriter","seo specialist","social media manager",
    "nurse","doctor","physician","pharmacist","driver","warehouse","customer support agent",
    "customer success manager","customer service"
  ];
  if (excludeTitle.some(t => title.includes(t))) return false;

  return true;
}

async function refreshFeed() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "⟳ Fetching...";

  const existing = await feedGet("all");
  const existingUrls = new Set((existing || []).map(j => j.url).filter(Boolean));

  let allJobs = [];

  setProgress("Fetching from Remotive (priority source)...");
  const remotiveJobs = await fetchRemotive();
  allJobs.push(...remotiveJobs);
  console.log(`Remotive: ${remotiveJobs.length} raw jobs`);

  setProgress("Fetching from Jobicy...");
  const jobicyJobs = await fetchJobicy();
  allJobs.push(...jobicyJobs);
  console.log(`Jobicy: ${jobicyJobs.length} raw jobs`);

  // Note: 80k Hours, Climatebase, ImpactPool, EA Board do not have public APIs.
  // Check these manually: jobs.80000hours.org | climatebase.org/jobs | impactpool.org | ea-internships.pory.app

  // Deduplicate
  const seen = new Set();
  allJobs = allJobs.filter(j => {
    if (!j.url || seen.has(j.url) || existingUrls.has(j.url)) return false;
    seen.add(j.url); return true;
  });

  setProgress(`Filtering ${allJobs.length} jobs...`);

  // Filter by relevance + geo
  const relevant = allJobs.filter(isRelevant);
  setProgress(`Analyzing ${relevant.length} relevant jobs...`);

  let saved = 0;
  for (const job of relevant) {
    const a = analyzeJob(job);
    if (a.hardNo) continue;
    if (a.asiaOnly) continue; // skip APAC-only
    // Skip non-remote if location is outside allowed regions
    if (a.remote === "No" && !a.geoOk) continue;
    await feedInsert({
      title: job.title, company: job.company, url: job.url,
      source: job.source, location: job.location,
      description: (job.description||"").slice(0, 1200),
      org_type: a.orgType, engagement_type: a.engagement,
      remote: a.remote, us_can_auth_required: a.usCanAuth,
      relocation_required: "Unclear",
      comp_visible: a.comp ? "yes" : "no",
      deadline: a.deadline,
      fit_summary: a.mission,
      hard_no: a.hardNo,
      status: "pending",
      score_overall: null,
      score_mission: null, score_role: null,
      score_seniority: a.seniority || null,
      score_impact: null,
    });
    saved++;
  }

  hideProgress();
  btn.disabled = false;
  btn.textContent = "⟳ Refresh Feed";
  await loadFeed();
  showStatus(`✓ ${saved} new jobs added to feed`);
}

function flagBadge(value, label, flipColors) {
  // For US/CAN auth and relocation: "yes" is BAD (red), "no" is GOOD (green)
  let cls, icon;
  if (flipColors) {
    cls = value === "yes" ? "flag-no" : value === "no" ? "flag-yes" : "flag-unclear";
    icon = value === "yes" ? "✗" : value === "no" ? "✓" : "?";
  } else {
    cls = value === "yes" ? "flag-yes" : value === "no" ? "flag-no" : "flag-unclear";
    icon = value === "yes" ? "✓" : value === "no" ? "✗" : "?";
  }
  return `<span class="flag-item ${cls}">${icon} ${label}</span>`;
}

        </div>
        <div style="background:rgba(255,255,255,0.03);border-radius:6px;padding:7px 10px;">
          <div style="color:#444;font-size:8px;text-transform:uppercase;margin-bottom:3px">Remote</div>
          <div style="color:${job.remote==='Yes'?'#4ade80':job.remote==='No'?'#f87171':'#666'}">${job.remote || "Unclear"}</div>
        </div>
        <div style="background:rgba(255,255,255,0.03);border-radius:6px;padding:7px 10px;">
          <div style="color:#444;font-size:8px;text-transform:uppercase;margin-bottom:3px">Posting deadline</div>
          <div style="color:#E8E8E8">${job.deadline || "Not stated"}</div>
        </div>
      </div>

      <div class="feed-flags">
        ${flagBadge(job.us_can_auth_required, "US/CAN auth req.", true)}
        ${comp ? `<span class="flag-item flag-yes">$ Comp visible</span>` : ""}
        ${job.location ? `<span class="flag-item flag-unclear">📍 ${job.location}</span>` : ""}
      </div>

      <div class="feed-actions">
        <button class="feed-btn-promote" onclick="promoteJob('${job.id}','${(job.company||"").replace(/'/g,"\'")}','${(job.title||"").replace(/'/g,"\'")}','${(job.url||"").replace(/'/g,"\'")}','${job.source||""}')">→ Add to Pipeline</button>
        ${job.url ? `<a class="feed-btn-link" href="${job.url}" target="_blank">View JD</a>` : ""}
        <button class="feed-btn-skip" onclick="skipJob('${job.id}')">Skip</button>
      </div>
    </div>`;
  }).join("");
}

async function promoteJob(id, company, role, url, source) {
  await dbInsert({ company, role, status: "researching", priority: "medium", link: url || null, source, notes: "" });
  await feedUpdateStatus(id, "promoted");
  document.getElementById(`fc-${id}`).style.opacity = "0.4";
  jobs = await dbGet(); render();
  showStatus(`✓ ${company} added to pipeline`);
  setTimeout(() => loadFeed(), 800);
}

async function skipJob(id) {
  await feedUpdateStatus(id, "skipped");
  document.getElementById(`fc-${id}`).style.opacity = "0.3";
  setTimeout(() => loadFeed(), 500);
}

function setFeedFilter(f, btn) {
  feedFilter = f;
  document.querySelectorAll(".feed-filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  loadFeed();
}

// ── EVENT LISTENERS ──
document.getElementById("detail-overlay").addEventListener("click", function(e) { if (e.target === this) closeDetailModal(); });
document.getElementById("form-overlay").addEventListener("click", function(e) { if (e.target === this) closeFormModal(); });
document.addEventListener("click", function(e) {
  const card = e.target.closest(".card[data-id]");
  const row = e.target.closest("tr.data-row[data-id]");
  const urgent = e.target.closest(".urgent-tag[data-id]");
  if (card) openDetail(card.dataset.id);
  else if (row) openDetail(row.dataset.id);
  else if (urgent) openDetail(urgent.dataset.id);
});

load();
</script>
</body>
